<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сессия МИИТа · Последний рубеж</title>
    <meta name="description" content="Экзаменационная игра с внешней базой вопросов по трём дисциплинам">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: #0b0b0e;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            padding: 8px;
            margin: 0;
            position: relative;
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0.2) 0px, transparent 4px);
            pointer-events: none;
            z-index: 999;
            mix-blend-mode: overlay;
        }

        #game-container {
            max-width: 820px;
            width: 100%;
            background: #12121a;
            padding: 16px 14px 20px;
            border: 3px solid #2c2c3a;
            box-shadow: 0 0 30px rgba(0,0,0,0.9), inset 0 0 12px #1f1f2a;
            border-radius: 24px;
            position: relative;
            backdrop-filter: blur(1px);
            transition: all 0.2s;
            margin: 0 auto;
        }

        .pixel-glitch {
            text-shadow: 2px 2px 0 #3f0040, -1px -1px 0 #0a0a30;
            letter-spacing: 2px;
        }

        h1, h2, h3 {
            font-weight: normal;
            text-transform: uppercase;
            color: #b9b9d6;
        }

        .screen {
            display: block;
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        .hp-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            background: #1a1a26;
            padding: 4px 10px;
            border-radius: 30px;
            border: 1px solid #33334a;
        }
        .hp-label {
            font-size: 11px;
            color: #bbbbdd;
            min-width: 60px;
        }
        .hearts {
            display: flex;
            gap: 2px;
            flex: 1;
            flex-wrap: wrap;
        }
        .heart {
            font-size: 18px;
            transition: all 0.3s;
        }
        .heart.alive { color: #ff3b3b; text-shadow: 0 0 12px #ff0000; }
        .heart.dead { color: #2a2a2a; text-shadow: none; }

        .arena {
            display: flex;
            justify-content: space-between;
            margin: 10px 0 8px;
            gap: 8px;
        }

        .portrait {
            background: #1c1c2a;
            padding: 10px 8px;
            border-radius: 30px 30px 16px 16px;
            border: 1px solid #3a3a50;
            text-align: center;
            flex: 1;
            font-size: 11px;
            color: #c0c0e0;
            box-shadow: inset 0 -6px 0 #0b0b12;
        }

        .magazine {
            background: #15151f;
            padding: 10px 8px;
            border-radius: 40px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            border: 1px solid #2e2e44;
            margin: 10px 0;
        }
        .bullet {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2a2a3a;
            border: 2px solid #3d3d5a;
            box-shadow: inset 0 -4px 0 #0c0c14;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .bullet.green { background: #2b6b2b; border-color: #5a9a5a; }
        .bullet.yellow { background: #7a7a2b; border-color: #baba4a; }
        .bullet.red { background: #7a2b2b; border-color: #ba4a4a; }
        .bullet.used { 
            opacity: 0.2; 
            transform: scale(0.7);
            filter: grayscale(1);
        }
        .bullet.defeated {
            border-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255,50,50,0.3);
        }
        .bullet.special {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }
        .bullet.critical {
            border-color: #ff00ff;
            box-shadow: 0 0 25px rgba(255,0,255,0.5);
            animation: pulse-critical 0.5s ease-in-out;
        }
        .bullet.auto-pass {
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.6);
            animation: pulse-auto 0.8s ease-in-out infinite;
        }

        @keyframes pulse-critical {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        @keyframes pulse-auto {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(0,255,136,0.6); }
            50% { transform: scale(1.2); box-shadow: 0 0 50px rgba(0,255,136,0.9); }
        }

        .action-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0 6px;
        }
        .btn {
            background: #1f1f32;
            border: 2px solid #3f3f5a;
            color: #dbdbff;
            padding: 12px 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 4px 0 #0b0b12;
            flex: 1;
            text-align: center;
            letter-spacing: 0.5px;
            min-height: 44px;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0b0b12;
        }
        .btn:hover {
            background: #2c2c44;
            border-color: #5f5f8a;
        }
        .btn:disabled {
            opacity: 0.3;
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0b0b12;
            pointer-events: none;
        }
        .btn-small {
            font-size: 10px;
            padding: 8px 10px;
            min-height: 36px;
        }

        .question-card {
            background: #191926;
            border: 2px solid #3b3b58;
            padding: 16px 14px;
            border-radius: 24px;
            margin: 12px 0;
            box-shadow: inset 0 0 30px #0a0a12;
        }
        .question-text {
            font-size: 14px;
            line-height: 1.6;
            color: #dedeff;
            margin-bottom: 14px;
            word-break: break-word;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .option-btn {
            background: #1b1b2e;
            border: 2px solid #3b3b5a;
            padding: 10px 6px;
            border-radius: 24px;
            color: #cfcfff;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            transition: 0.06s;
            box-shadow: 0 3px 0 #0b0b12;
            text-align: center;
            min-height: 40px;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }
        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0b0b12;
        }
        .option-btn.correct-glow {
            background: #1f5f2f;
            border-color: #6fcf6f;
        }
        .option-btn.wrong-glow {
            background: #5f1f1f;
            border-color: #cf4f4f;
        }
        .option-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .timer {
            height: 6px;
            background: #2f2f44;
            border-radius: 16px;
            margin: 10px 0 4px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            background: #8f8fbf;
            width: 100%;
            transition: width 0.1s linear;
        }

        .interlude {
            background: #12121f;
            border: 2px solid #3a3a5a;
            border-radius: 30px;
            padding: 18px 14px;
        }
        .inventory-slot {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .item-badge {
            background: #1f1f34;
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #4a4a6a;
            color: #bbbbf0;
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }
        .item-badge:active {
            transform: scale(0.95);
        }
        .item-badge:hover {
            background: #2f2f4a;
            border-color: #6a6a8a;
        }

        .coffee-machine {
            background: #1b1b2a;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            border: 1px solid #4a4a6a;
            margin: 10px 0;
        }
        .coffee-machine .btn {
            font-size: 10px;
            padding: 8px 12px;
            min-height: 36px;
            flex: 0 1 auto;
        }

        .ask-popup {
            background: #1a1a2e;
            border: 2px solid #4a4a6a;
            border-radius: 24px;
            padding: 14px;
            margin: 10px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .ask-popup .btn {
            flex: 0 1 auto;
            min-width: 100px;
            font-size: 10px;
            padding: 8px 12px;
            min-height: 36px;
        }

        .event-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
            padding: 16px;
        }
        .event-box {
            background: #1a1a2e;
            border: 3px solid #4a4a7a;
            border-radius: 30px;
            padding: 30px 24px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(100,100,200,0.2);
        }
        .event-box h2 {
            font-size: 18px;
            color: #e0e0ff;
            margin-bottom: 12px;
        }
        .event-box p {
            color: #b0b0d0;
            font-size: 12px;
            line-height: 1.8;
            margin-bottom: 18px;
            white-space: pre-line;
        }
        .event-box .btn {
            padding: 12px 30px;
            font-size: 12px;
            min-height: 40px;
        }

        /* ЛЕГЕНДАРНОЕ ОКНО НИКОЛАЯ */
        .event-box.legendary {
            background: linear-gradient(135deg, #1a1a0a, #2a1a0a, #3a2a0a);
            border-color: #ffd700;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.3), inset 0 0 60px rgba(255, 215, 0, 0.1);
            animation: legendary-glow 2s ease-in-out infinite;
        }
        .event-box.legendary h2 {
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        .event-box.legendary p {
            color: #e8d5a0;
        }
        .event-box.legendary .btn {
            background: #3a2a0a;
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 4px 0 #1a1a0a;
        }
        .event-box.legendary .btn:hover {
            background: #4a3a1a;
            border-color: #ffed4a;
        }

        @keyframes legendary-glow {
            0%, 100% { box-shadow: 0 0 80px rgba(255, 215, 0, 0.3), inset 0 0 60px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 120px rgba(255, 215, 0, 0.5), inset 0 0 80px rgba(255, 215, 0, 0.2); }
        }

        .exam-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: #151521;
            border-radius: 24px;
            border: 1px solid #2a2a3a;
            margin: 6px 0;
            font-size: 10px;
            color: #8a8aaa;
            flex-wrap: wrap;
            gap: 4px;
        }
        .exam-info span {
            color: #bbbbdd;
        }

        .teacher-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 9px;
            background: #2a2a4a;
        }

        .notification-container {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 300px;
            pointer-events: none;
            width: calc(100% - 20px);
        }

        .notification {
            padding: 12px 16px;
            border-radius: 14px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            animation: slideIn 0.4s ease-out, fadeOut 0.4s ease-in 2.2s forwards;
            pointer-events: auto;
            border: 2px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            word-break: break-word;
        }

        .notification.success {
            background: rgba(34, 139, 34, 0.92);
            border-color: #2ecc71;
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }
        .notification.error {
            background: rgba(139, 34, 34, 0.92);
            border-color: #e74c3c;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }
        .notification.critical {
            background: rgba(139, 34, 139, 0.92);
            border-color: #ff00ff;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
            animation: slideIn 0.4s ease-out, pulse-critical-notification 0.5s ease-in-out 1.5s, fadeOut 0.4s ease-in 2.6s forwards;
        }
        .notification.event {
            background: rgba(139, 69, 19, 0.92);
            border-color: #f39c12;
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }
        .notification.auto-pass {
            background: rgba(0, 180, 100, 0.92);
            border-color: #00ff88;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            animation: slideIn 0.4s ease-out, pulse-auto-notification 0.5s ease-in-out 1.5s, fadeOut 0.4s ease-in 2.6s forwards;
        }
        .notification.nikolay {
            background: linear-gradient(135deg, #3a2a0a, #5a3a1a);
            border-color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: slideIn 0.4s ease-out, legendary-pulse 1s ease-in-out 1.5s, fadeOut 0.4s ease-in 2.6s forwards;
        }
        .notification.sleep {
            background: rgba(100, 80, 180, 0.92);
            border-color: #9a7aff;
            text-shadow: 0 0 30px rgba(154, 122, 255, 0.5);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.8); }
        }

        @keyframes pulse-critical-notification {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); border-color: #ff69b4; }
        }

        @keyframes pulse-auto-notification {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); border-color: #00ff88; }
        }

        @keyframes legendary-pulse {
            0%, 100% { transform: scale(1); border-color: #ffd700; }
            50% { transform: scale(1.1); border-color: #ffed4a; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .combo-counter {
            display: inline-block;
            background: #2a1a3a;
            padding: 2px 10px;
            border-radius: 16px;
            border: 1px solid #6a3a7a;
            color: #ddaaff;
            font-size: 10px;
            margin-left: 4px;
        }
        .combo-counter.active {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255,0,255,0.3);
            animation: pulse-combo 0.6s ease-in-out infinite;
        }

        @keyframes pulse-combo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .menu-title {
            font-size: 22px;
            text-align: center;
            margin: 16px 0 8px;
        }
        .menu-subtitle {
            font-size: 14px;
            text-align: center;
            color: #9f9fcf;
            margin-bottom: 24px;
        }
        .menu-btn {
            padding: 16px 30px;
            font-size: 16px;
            min-height: 50px;
        }

        .gameover-title {
            font-size: 32px;
            color: #cf3f3f;
            text-shadow: 0 0 20px #8f0000;
        }
        .win-title {
            font-size: 28px;
            color: #8fcf8f;
            text-shadow: 0 0 20px #1f7f1f;
        }

        .nikolay-emoji {
            font-size: 48px;
            display: block;
            margin: 10px 0;
        }

        @media (max-width: 600px) {
            #game-container { padding: 10px 10px 14px; border-radius: 16px; }
            .options { grid-template-columns: 1fr; gap: 6px; }
            .btn { font-size: 10px; padding: 10px 12px; min-height: 38px; }
            .portrait { font-size: 10px; padding: 8px 6px; }
            .heart { font-size: 16px; }
            .event-box { padding: 20px 16px; margin: 10px; }
            .event-box h2 { font-size: 16px; }
            .event-box p { font-size: 11px; }
            .question-text { font-size: 13px; }
            .option-btn { font-size: 9px; padding: 8px 6px; min-height: 34px; }
            .exam-info { font-size: 9px; padding: 4px 8px; }
            .notification { font-size: 9px; padding: 10px 14px; max-width: 260px; }
            .menu-title { font-size: 18px; }
            .menu-subtitle { font-size: 12px; }
            .menu-btn { font-size: 14px; padding: 14px 24px; min-height: 44px; }
            .gameover-title { font-size: 26px; }
            .win-title { font-size: 22px; }
            .bullet { width: 24px; height: 24px; }
            .hp-label { font-size: 10px; min-width: 50px; }
            .coffee-machine .btn { font-size: 9px; padding: 6px 10px; min-height: 30px; }
            .ask-popup .btn { font-size: 9px; padding: 6px 10px; min-height: 30px; min-width: 80px; }
            .item-badge { font-size: 9px; padding: 4px 10px; }
        }

        @media (max-width: 400px) {
            #game-container { padding: 6px 6px 10px; border-radius: 12px; }
            .btn { font-size: 9px; padding: 8px 8px; min-height: 32px; border-radius: 30px; }
            .question-text { font-size: 11px; }
            .option-btn { font-size: 8px; padding: 6px 4px; min-height: 30px; }
            .bullet { width: 20px; height: 20px; }
            .heart { font-size: 14px; }
            .hp-label { font-size: 9px; min-width: 40px; }
            .portrait { font-size: 9px; padding: 6px 4px; }
            .menu-title { font-size: 16px; }
            .menu-btn { font-size: 12px; padding: 12px 16px; min-height: 38px; }
            .exam-info { font-size: 8px; padding: 3px 6px; gap: 2px; }
            .notification { font-size: 8px; padding: 8px 12px; max-width: 200px; }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            #game-container { max-width: 600px; padding: 8px 12px 12px; }
            .hp-container { padding: 2px 8px; gap: 4px; }
            .heart { font-size: 14px; }
            .hp-label { font-size: 9px; min-width: 40px; }
            .portrait { font-size: 9px; padding: 4px 6px; }
            .bullet { width: 20px; height: 20px; }
            .magazine { padding: 6px; gap: 4px; margin: 4px 0; }
            .btn { font-size: 9px; padding: 6px 10px; min-height: 28px; }
            .question-text { font-size: 11px; margin-bottom: 8px; }
            .option-btn { font-size: 8px; padding: 4px 6px; min-height: 28px; }
            .question-card { padding: 10px 10px; margin: 6px 0; }
            .exam-info { font-size: 8px; padding: 2px 6px; margin: 2px 0; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <!-- МЕНЮ -->
    <div id="menu-screen" class="screen">
        <h1 class="menu-title pixel-glitch">СЕССИЯ МИИТА</h1>
        <h2 class="menu-subtitle">последний рубеж</h2>
        <div style="text-align: center; margin: 20px 0;">
            <button id="btn-start-game" class="btn menu-btn">НАЧАТЬ СЕССИЮ</button>
        </div>
        <div style="color:#5a5a7a;text-align:center;font-size:10px;margin-top:20px;">VHS · PS1 · МИИТ 2026</div>
    </div>

    <!-- ЭКЗАМЕН -->
    <div id="exam-screen" class="screen hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px;">
            <span id="exam-title" style="color:#b0b0dd;font-size:12px;">БЕЗРЯКОВ</span>
            <span id="turn-indicator" style="color:#b0b0dd;font-size:11px;background:#1a1a2a;padding:4px 12px;border-radius:30px;">ХОД ИГРОКА</span>
        </div>

        <div class="hp-container">
            <span class="hp-label">💚 СТУДЕНТ</span>
            <div class="hearts" id="player-hearts"></div>
        </div>
        <div class="hp-container">
            <span class="hp-label">❤️‍🔥 ПРЕПОД</span>
            <div class="hearts" id="teacher-hearts"></div>
        </div>

        <div class="arena">
            <div class="portrait">👨‍🏫 <span id="teacher-name-label">Безряков</span><br><span style="font-size:9px;color:#7a7a9a;" id="teacher-subtitle">«по полочкам»</span></div>
            <div class="portrait">🧑‍🎓 СТУДЕНТ<br><span style="font-size:9px;color:#7a7a9a;" id="student-hp-label">4HP</span></div>
        </div>

        <div class="exam-info">
            <span>🎫 Билеты: <span id="tickets-left">6</span></span>
